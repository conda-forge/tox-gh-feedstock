{% set name = "tox-gh" %}
{% set version = "1.6.1" %}
{% set python_min = "3.10.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tox_gh-{{ version }}.tar.gz
  sha256: 070b69bf50821393e1ff0237006bb61b33347e2060eaec415fbfdefa48131aa7

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatch-vcs >=0.5
    - hatchling >=1.27
    - pip
  run:
    - python >={{ python_min }}
    - tox >=4.31
  run_constrained:
    - covdefaults >=2.3
    - devpi-process >=1.0.2
    - diff-cover >=9.7.1
    - pytest >=8.4.2
    - pytest-cov >=7
    - pytest-mock >=3.15.1

test:
  imports:
    - tox_gh
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/tox-dev/tox-gh
  summary: Seamless integration of tox into GitHub Actions.
  description: |
    tox-gh is a tox plugin which helps running tox on GitHub Actions with multiple
    different Python versions on multiple workers in parallel.
  dev_url: https://github.com/tox-dev/tox-gh
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Zeitsperre
